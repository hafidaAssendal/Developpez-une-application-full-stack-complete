<app-header [showNav]="true"/>

<div class="themes-container">

  <h1>Thèmes</h1>

  <!-- Loading -->
  @if (isLoading()) {
    <div class="loading">
      <mat-spinner diameter="48"/>
    </div>
  }

  <!-- Erreur -->
  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  <!-- Themes -->
  @if (!isLoading()) {
    <div class="themes-grid">
      @for (theme of themes(); track theme.id) {
        <div class="theme-card">
          <h2 class="theme-title">{{ theme.title }}</h2>
          <p class="theme-description">{{ theme.description }}</p>

          @if (theme.subscribed) {
            <button mat-stroked-button disabled class="btn-subscribed">
              Déjà abonné
            </button>
          } @else {
            <button
              mat-raised-button
              color="primary"
              (click)="subscribe(theme)">
              S'abonner
            </button>
          }

        </div>
      } @empty {
        <p class="empty">Aucun thème disponible.</p>
      }
    </div>
  }

</div>
