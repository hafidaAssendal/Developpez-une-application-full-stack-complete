spring.application.name=mdd

# ======= BASE DE DONNÉES =======
spring.datasource.url=jdbc:mysql://localhost:3307/${MYSQL_DATABASE}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======= JPA / HIBERNATE =======
spring.jpa.properties.hibernate.format_sql=true

# ======= JWT =======
mdd.app.jwtSecret=${JWT_SECRET}
mdd.app.jwtExpirationMs=${JWT_EXPIRATION}
